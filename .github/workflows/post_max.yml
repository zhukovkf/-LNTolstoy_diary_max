name: Daily Tolstoy post (MAX)

on:
  schedule:
      - cron: '0 6 * * *'   # 06:00 UTC = 09:00 МСК
        workflow_dispatch: {}

        permissions:
          contents: write

          jobs:
            post:
                runs-on: ubuntu-latest
                    steps:
                          - uses: actions/checkout@v4

                                - uses: actions/setup-python@v5
                                        with:
                                                  python-version: '3.12'

                                                        - name: Install dependencies
                                                                run: pip install -r requirements.txt

                                                                      - name: Post next diary entry to MAX
                                                                              run: python3 post_next_entry_max.py
                                                                                      env:
                                                                                                MAX_BOT_TOKEN: ${{ secrets.MAX_BOT_TOKEN }}
                                                                                                          MAX_CHAT_ID: ${{ secrets.MAX_CHAT_ID }}
                                                                                                          
                                                                                                                - name: Save updated state back to the repo
                                                                                                                        run: |
                                                                                                                                  git config user.name "tolstoy-bot-max"
                                                                                                                                            git config user.email "tolstoy-bot-max@users.noreply.github.com"
                                                                                                                                                      git add state_max.json
                                                                                                                                                                git diff --quiet --cached || git commit -m "chore: update MAX posting state"
                                                                                                                                                                          git push
